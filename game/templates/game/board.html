<!DOCTYPE html>
<html>
<head>
    <title>Modern Chess Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <h1>Drag & Drop Chess</h1>
    <div id="myBoard" style="width: 400px"></div>
    <button onclick="location.href='/reset/'">Reset Game</button>

    <script>
        var board = null
        var game = new Chess('{{ fen }}') // Initialize with the current position

       function onDrop (source, target) {
            // Check if this move is a promotion
            var move_cfg = {
                from: source,
                to: target,
                promotion: 'q' 
            }

            var move = game.move(move_cfg)

            // If illegal, snap back
            if (move === null) return 'snapback'

            // This is the fix: If it's a promotion, we must send the 'q' to Django
            var move_string = source + target
            if (move.flags.includes('p')) {
                move_string += 'q'
            }

            updateBackend(move_string)
        }

        function updateBackend(move) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/';
            const csrf = document.createElement('input');
            csrf.type = 'hidden';
            csrf.name = 'csrfmiddlewaretoken';
            csrf.value = '{{ csrf_token }}';
            const moveInput = document.createElement('input');
            moveInput.type = 'hidden';
            moveInput.name = 'move';
            moveInput.value = move;
            form.appendChild(csrf);
            form.appendChild(moveInput);
            document.body.appendChild(form);
            form.submit();
        }

        var config = {
            draggable: true,
            position: '{{ fen|default:"start" }}',
            onDrop: onDrop,
            // Add this line below to load images from the web
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        }
        board = Chessboard('myBoard', config)
    </script>
</body>
</html>
