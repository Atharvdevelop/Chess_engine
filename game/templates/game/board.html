<!DOCTYPE html>
<html>
<head>
    <title>Modern Chess Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        /* This ensures the controls don't push the board too far down */
        .controls { margin-top: 20px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
        .btn { padding: 8px 16px; margin-right: 5px; cursor: pointer; text-decoration: none; background: #eee; border: 1px solid #ccc; color: black; display: inline-block; border-radius: 4px; }
        .btn-danger { background: #ff4444; color: white; border: none; }
        .active { background: #444; color: white; }
        h1 { font-family: sans-serif; }
    </style>
</head>
<body>
    <h1>Drag & Drop Chess</h1>

    <div id="myBoard" style="width: 400px; margin: 0 auto;"></div>

    <div class="controls" style="width: 400px; margin: 20px auto; text-align: center;">
        <span>Playing as: <strong>{{ user_color|title }}</strong></span><br><br>
        <a href="/?choose_color=white" class="btn {% if user_color == 'white' %}active{% endif %}">Play as White</a>
        <a href="/?choose_color=black" class="btn {% if user_color == 'black' %}active{% endif %}">Play as Black</a>
        <button class="btn btn-danger" onclick="location.href='/reset/'">Reset Game</button>
    </div>

    <script>
        var board = null
        var game = new Chess('{{ fen }}')

        function onDrop (source, target) {
            var move_cfg = {
                from: source,
                to: target,
                promotion: 'q' 
            }

            var move = game.move(move_cfg)
            if (move === null) return 'snapback'

            var move_string = source + target
            if (move.flags.includes('p')) {
                move_string += 'q'
            }

            updateBackend(move_string)
        }

        function updateBackend(move) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/';
            const csrf = document.createElement('input');
            csrf.type = 'hidden';
            csrf.name = 'csrfmiddlewaretoken';
            csrf.value = '{{ csrf_token }}';
            const moveInput = document.createElement('input');
            moveInput.type = 'hidden';
            moveInput.name = 'move';
            moveInput.value = move;
            form.appendChild(csrf);
            form.appendChild(moveInput);
            document.body.appendChild(form);
            form.submit();
        }

        var config = {
            draggable: true,
            position: '{{ fen|default:"start" }}',
            orientation: '{{ user_color }}', 
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        }
        board = Chessboard('myBoard', config)
    </script>
</body>
</html>
